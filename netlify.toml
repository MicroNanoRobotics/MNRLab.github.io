[build]
  command = "python3 scripts/sync_i18n_content.py && hugo --minify --ignoreVendorPaths=\"\" -b $URL"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.150.1"
  HUGO_EXTENDED = "true"
  HUGO_ENABLEGITINFO = "true"

[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview]
  command = "python3 scripts/sync_i18n_content.py && hugo --minify --ignoreVendorPaths=\"\" --buildFuture -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "python3 scripts/sync_i18n_content.py && hugo --minify --ignoreVendorPaths=\"\" -b $DEPLOY_PRIME_URL"

[[plugins]]
  package = "netlify-plugin-hugo-cache-resources"
  [plugins.inputs]
    debug = true
