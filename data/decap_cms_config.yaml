# Decap CMS configuration consumed by the Hugo Blox Decap CMS plugin.
# The generated file is published at /admin/config.yml.
backend:
  name: github
  repo: MicroNanoRobotics/MNRLab.github.io
  branch: main
  site_domain: micronanorobotics.github.io
  open_authoring: true
  squash_merges: true
  # GitHub Pages still needs a Decap-compatible OAuth proxy for online login.
  # After deploying one, uncomment and set these two lines:
  # base_url: https://your-decap-oauth-proxy.example.com
  # auth_endpoint: auth

publish_mode: editorial_workflow
media_folder: static/uploads
public_folder: /uploads

collections:
  - name: site_pages
    label: Site Pages / 页面
    files:
      - file: content/_index.md
        label: Home EN
        name: home_en
        fields:
          - { label: Translation Key, name: translationKey, widget: string, default: home }
          - { label: Title, name: title, widget: string }
          - { label: Page Type, name: type, widget: hidden, default: landing }
          - label: Sections
            name: sections
            widget: list
            required: false
            fields:
              - { label: Block Type, name: block, widget: select, options: [hero, slider, collection, markdown] }
              - label: Content
                name: content
                widget: object
                required: false
                fields:
                  - { label: Title, name: title, widget: string, required: false }
                  - { label: Subtitle, name: subtitle, widget: string, required: false }
                  - { label: Text, name: text, widget: markdown, required: false }
                  - { label: Count, name: count, widget: number, value_type: int, required: false }
                  - { label: Page Type, name: page_type, widget: string, required: false }
                  - label: Image
                    name: image
                    widget: object
                    required: false
                    fields:
                      - { label: Filename, name: filename, widget: string, required: false }
                  - label: Filters
                    name: filters
                    widget: object
                    required: false
                    fields:
                      - { label: Author, name: author, widget: string, required: false }
                      - { label: Category, name: category, widget: string, required: false }
                      - { label: Tag, name: tag, widget: string, required: false }
                      - { label: Publication Type, name: publication_type, widget: string, required: false }
                      - { label: Exclude Featured, name: exclude_featured, widget: boolean, default: false, required: false }
                  - label: Slides
                    name: slides
                    widget: list
                    required: false
                    fields:
                      - { label: Slide Title, name: title, widget: string, required: false }
                      - { label: Content, name: content, widget: markdown, required: false }
                      - { label: Align, name: align, widget: select, options: [left, center, right, top], required: false }
                      - label: Background
                        name: background
                        widget: object
                        required: false
                        fields:
                          - label: Image
                            name: image
                            widget: object
                            required: false
                            fields:
                              - { label: Filename, name: filename, widget: string, required: false }
                          - { label: Position, name: position, widget: string, required: false }
                          - { label: Color, name: color, widget: string, required: false }
                  - label: Link
                    name: link
                    widget: object
                    required: false
                    fields:
                      - { label: Text, name: text, widget: string, required: false }
                      - { label: URL, name: url, widget: string, required: false }
                      - { label: Icon, name: icon, widget: string, required: false }
                      - { label: Icon Pack, name: icon_pack, widget: string, required: false }
              - label: Design
                name: design
                widget: object
                required: false
                fields:
                  - { label: View, name: view, widget: string, required: false }
                  - { label: Columns, name: columns, widget: string, required: false }
                  - { label: Slide Width, name: slide_width, widget: string, required: false }
                  - { label: Full Screen, name: is_fullscreen, widget: boolean, required: false }
                  - { label: Loop, name: loop, widget: boolean, required: false }
                  - { label: Interval, name: interval, widget: number, value_type: int, required: false }
      - file: content/_index.zh.md
        label: Home 中文
        name: home_zh
