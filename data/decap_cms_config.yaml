                  - { label: 列数, name: columns, widget: string, required: false }
                  - { label: 幻灯片宽度, name: slide_width, widget: string, required: false }
                  - { label: 全屏, name: is_fullscreen, widget: boolean, required: false }
                  - { label: 循环, name: loop, widget: boolean, required: false }
                  - { label: 间隔, name: interval, widget: number, value_type: int, required: false }
      - file: content/tour/index.md
        label: Tour EN
