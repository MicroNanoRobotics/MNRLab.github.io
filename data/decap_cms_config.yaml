# Decap CMS configuration consumed by the Hugo Blox Decap CMS plugin.
# The generated file is published at /admin/config.yml.
backend:
  name: github
  repo: MicroNanoRobotics/MNRLab.github.io
  branch: main
  squash_merges: true

publish_mode: editorial_workflow
media_folder: static/uploads
public_folder: /uploads

collections:
  - name: site_pages
    label: Site Pages
    files:
      - file: content/tour/index.md
        label: Tour Page
        name: tour
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Date, name: date, widget: datetime, required: false }
          - { label: Page Type, name: type, widget: hidden, default: landing }
          - label: Sections
            name: sections
            widget: list
            required: false
            fields:
              - { label: Block Type, name: block, widget: select, options: [hero, slider, collection, markdown] }
              - label: Content
                name: content
                widget: object
                required: false
                fields:
                  - { label: Title, name: title, widget: string, required: false }
                  - { label: Subtitle, name: subtitle, widget: string, required: false }
                  - { label: Text, name: text, widget: markdown, required: false }
                  - { label: Count, name: count, widget: number, value_type: int, required: false }
                  - { label: Page Type, name: page_type, widget: string, required: false }
                  - label: Image
                    name: image
                    widget: object
                    required: false
                    fields:
                      - { label: Filename, name: filename, widget: string, required: false }
                  - label: Filters
                    name: filters
                    widget: object
                    required: false
                    fields:
                      - { label: Author, name: author, widget: string, required: false }
                      - { label: Category, name: category, widget: string, required: false }
                      - { label: Tag, name: tag, widget: string, required: false }
                      - { label: Publication Type, name: publication_type, widget: string, required: false }
                      - { label: Exclude Featured, name: exclude_featured, widget: boolean, default: false, required: false }
                  - label: Slides
                    name: slides
                    widget: list
                    required: false
                    fields:
                      - { label: Slide Title, name: title, widget: string, required: false }
                      - { label: Content, name: content, widget: markdown, required: false }
                      - { label: Align, name: align, widget: select, options: [left, center, right, top], required: false }
                      - label: Background
                        name: background
                        widget: object
                        required: false
                        fields:
                          - label: Image
                            name: image
                            widget: object
                            required: false
                            fields:
                              - { label: Filename, name: filename, widget: string, required: false }
                          - { label: Position, name: position, widget: string, required: false }
                          - { label: Color, name: color, widget: string, required: false }
                  - label: Link
                    name: link
                    widget: object
                    required: false
                    fields:
                      - { label: Text, name: text, widget: string, required: false }
                      - { label: URL, name: url, widget: string, required: false }
                      - { label: Icon, name: icon, widget: string, required: false }
                      - { label: Icon Pack, name: icon_pack, widget: string, required: false }
              - label: Design
                name: design
                widget: object
                required: false
                fields:
                  - { label: View, name: view, widget: string, required: false }
                  - { label: Columns, name: columns, widget: string, required: false }
                  - { label: Slide Width, name: slide_width, widget: string, required: false }
                  - { label: Full Screen, name: is_fullscreen, widget: boolean, required: false }
                  - { label: Loop, name: loop, widget: boolean, required: false }
                  - { label: Interval, name: interval, widget: number, value_type: int, required: false }

  - name: publications
    label: Publications
    label_singular: Publication
    folder: content/publication
    path: "{{slug}}/index"
    create: true
    editor:
      preview: false
    media_folder: static/uploads/publications
    public_folder: /uploads/publications
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Authors, name: authors, widget: list, required: true }
      - { label: Author Notes, name: author_notes, widget: list, required: false }
      - { label: Publication Date, name: date, widget: datetime, required: true }
      - { label: Publish Date, name: publishDate, widget: datetime, required: false }
      - { label: Publication, name: publication, widget: string, required: false }
      - { label: Publication Short, name: publication_short, widget: string, required: false }
      - { label: Abstract, name: abstract, widget: text, required: false }
      - { label: Summary, name: summary, widget: text, required: false }
      - { label: DOI, name: doi, widget: string, required: false }
      - { label: PDF, name: url_pdf, widget: file, required: false }
      - { label: Code URL, name: url_code, widget: string, required: false }
      - { label: Dataset URL, name: url_dataset, widget: string, required: false }
      - { label: Project URL, name: url_project, widget: string, required: false }
      - { label: External Link, name: external_link, widget: string, required: false }
      - { label: Supplementary PDF, name: url_supplement, widget: file, required: false }
      - label: Publication Types
        name: publication_types
        widget: select
        multiple: true
        required: true
        default: [article-journal]
        options:
          - { label: Journal Article, value: article-journal }
          - { label: Conference Paper, value: paper-conference }
          - { label: Preprint, value: paper }
          - { label: Report, value: report }
          - { label: Book, value: book }
          - { label: Book Chapter, value: chapter }
          - { label: Thesis, value: thesis }
          - { label: Patent, value: patent }
          - { label: Manuscript, value: manuscript }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Patent Type, name: patent_type, widget: string, required: false }
      - { label: Patent Country, name: country, widget: string, required: false }
      - { label: Application Number, name: application_number, widget: string, required: false }
      - { label: Publication Number, name: publication_number, widget: string, required: false }
      - { label: Grant Number, name: grant_number, widget: string, required: false }
      - { label: Patent Status, name: status, widget: select, required: false, options: [申请中, 已公开, 已授权, 转化中] }
      - { label: Certificate PDF, name: certificate_pdf, widget: file, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false, required: false }
      - label: Image
        name: image
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Filename, name: filename, widget: image, required: false }
          - { label: Caption, name: caption, widget: string, required: false }
          - { label: Focal Point, name: focal_point, widget: string, default: Smart, required: false }
          - { label: Preview Only, name: preview_only, widget: boolean, default: false, required: false }
      - { label: Body, name: body, widget: markdown, required: false }

