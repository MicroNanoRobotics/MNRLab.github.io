      - { label: Body, name: body, widget: markdown, required: true }

  - name: authors
    label: People
    label_singular: Person
    folder: content/authors
    path: "{{slug}}/_index"
    create: true
    editor:
      preview: false
    media_folder: static/uploads/people
    public_folder: /uploads/people
    fields:
      - { label: Display Name, name: title, widget: string }
      - { label: Full Name, name: name, widget: string, required: false }
      - { label: Role, name: role, widget: string, required: false }
      - label: User Groups
        name: user_groups
        widget: select
        multiple: true
        required: false
        options:
          - Principal Investigator
          - Principal Investigators
          - Faculty
          - Postdoctoral Researchers
          - Postdocs
          - PhD Students
          - Master Students
          - Masters Students
          - Undergraduate Students
          - Administration
          - Visitors
          - Alumni
      - { label: Short Bio, name: bio, widget: text, required: false }
      - { label: Interests, name: interests, widget: list, required: false }
      - label: Education
        name: education
        widget: object
        required: false
        collapsed: true
        fields:
          - label: Courses
            name: courses
            widget: list
            required: false
            fields:
              - { label: Course, name: course, widget: string, required: false }
              - { label: Institution, name: institution, widget: string, required: false }
              - { label: Year, name: year, widget: string, required: false }
      - { label: Email, name: email, widget: string, required: false }
      - label: Social Links
        name: social
        widget: list
        required: false
        fields:
          - { label: Icon, name: icon, widget: string, required: false }
          - { label: Icon Pack, name: icon_pack, widget: select, required: false, options: [fas, far, fab, ai] }
          - { label: Link, name: link, widget: string, required: false }
      - { label: Avatar Upload, name: avatar, widget: image, required: false }
      - label: Group Order
        name: group_order
        widget: list
        required: false
        summary: "{{fields.group}}: {{fields.order}}"
        fields:
          - label: Group
            name: group
            widget: select
            options:
              - Principal Investigators
              - Postdocs
              - PhD Students
              - Masters Students
              - Undergraduate Students
              - Administration
              - Visitors
              - Alumni
          - { label: Order in this group (数字越小越靠前), name: order, widget: number, value_type: int, default: 100 }
      - { label: Superuser, name: superuser, widget: boolean, default: false, required: false }
      - { label: Highlight Name, name: highlight_name, widget: boolean, default: false, required: false }
      - { label: Body, name: body, widget: markdown, required: false }

