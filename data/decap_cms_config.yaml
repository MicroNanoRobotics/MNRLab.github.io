      - { label: 出版物简称, name: publication_short, widget: string, required: false }
      - { label: 中文摘要或简介, name: abstract, widget: text, required: false }
      - { label: 摘要卡片, name: summary, widget: text, required: false }
      - { label: DOI, name: doi, widget: string, required: false }
      - { label: PDF, name: url_pdf, widget: file, required: false }
      - { label: Code URL, name: url_code, widget: string, required: false }
      - { label: Dataset URL, name: url_dataset, widget: string, required: false }
      - { label: Project URL, name: url_project, widget: string, required: false }
      - { label: 外部链接, name: external_link, widget: string, required: false }
      - { label: 补充材料 PDF, name: url_supplement, widget: file, required: false }
      - label: 成果类型
        name: publication_types
        widget: select
        multiple: true
        required: true
        default: [article-journal]
        options:
          - { label: 期刊论文, value: article-journal }
          - { label: 会议论文, value: paper-conference }
          - { label: 预印本, value: paper }
          - { label: 报告, value: report }
          - { label: 书籍, value: book }
          - { label: 章节, value: chapter }
          - { label: 学位论文, value: thesis }
          - { label: 专利, value: patent }
          - { label: 手稿, value: manuscript }
      - { label: 标签, name: tags, widget: list, required: false }
      - { label: 专利类型, name: patent_type, widget: string, required: false }
      - { label: 国家 / 地区, name: country, widget: string, required: false }
      - { label: 申请号, name: application_number, widget: string, required: false }
      - { label: 公开号, name: publication_number, widget: string, required: false }
      - { label: 授权号, name: grant_number, widget: string, required: false }
      - { label: 专利状态, name: status, widget: select, required: false, options: [申请中, 已公开, 已授权, 转化中] }
      - { label: 证书 PDF, name: certificate_pdf, widget: file, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false, required: false }
      - label: 图形摘要 / 图片
        name: image
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: 文件名, name: filename, widget: image, required: false }
          - { label: 图片说明, name: caption, widget: string, required: false }
          - { label: 焦点, name: focal_point, widget: string, default: Smart, required: false }
          - { label: 仅预览, name: preview_only, widget: boolean, default: false, required: false }
      - { label: 正文, name: body, widget: markdown, required: false }

