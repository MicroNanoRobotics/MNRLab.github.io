<!doctype html>
<html lang="zh-cn">
<head>
  <meta content="noindex" name="robots">
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>网站后台管理</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #1f2937;
    }

    .cms-loading-note {
      max-width: 720px;
      margin: 12vh auto 0;
      padding: 0 24px;
      line-height: 1.7;
    }

    .cms-loading-note h1 {
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: 650;
    }

    .cms-loading-note code {
      padding: 2px 6px;
      border-radius: 4px;
      background: #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="cms-loading-note" id="cms-loading-note">
    <h1>网站后台管理</h1>
    <p>后台正在加载。如果长时间停在这里，请刷新页面，或检查浏览器是否阻止了外部脚本。</p>
    <p>只有拥有仓库写权限的 GitHub 账号才能登录并修改网站内容。</p>
  </div>

  <script>
    (() => {
      const cmsHost = 'zesty-marigold-84172f.netlify.app';
      if (window.location.hostname !== cmsHost) {
        window.location.replace(`https://${cmsHost}/admin/`);
      }
    })();
  </script>
  <script>
    window.CMS_MANUAL_INIT = false;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3/dist/decap-cms.js"></script>
</body>
</html>
